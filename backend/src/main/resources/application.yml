spring:
  application:
    name: MibiatchiCar

  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      # Tell Spring to ALWAYS run the initialization scripts (data.sql)
      mode: always

  jpa:
    # Tell Spring to wait for Hibernate to create tables before running data.sql
    defer-datasource-initialization: true

    hibernate:
      # 'update' tells Spring to automatically create/modify tables based on your Entities!
      ddl-auto: create

    show-sql: true # Prints the SQL in your console so you can see what Spring is doing

    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080